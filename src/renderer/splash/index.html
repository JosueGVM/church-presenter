<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #0d0d10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }

        .card {
            width: 100%;
            height: 100%;
            background-color: #0d0d10;
            border: 1px solid #1f1f28;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            position: relative;
        }

        /* Línea de acento superior */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #007acc, transparent);
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: fadeUp 0.5s ease forwards;
        }

        .logo-icon {
            width: 68px;
            height: 68px;
            border-radius: 18px;
            background: linear-gradient(135deg, #007acc 0%, #005999 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 32px rgba(0,122,204,0.35);
        }
        .logo-icon svg {
            width: 38px;
            height: 38px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logo-text h1 {
            font-size: 22px;
            font-weight: 700;
            color: #e2e2e7;
            text-align: center;
            letter-spacing: -0.3px;
        }
        .logo-text p {
            font-size: 11px;
            color: #3f3f46;
            text-align: center;
            margin-top: 3px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .progress-wrap {
            margin-top: 36px;
            width: 160px;
            height: 2px;
            background-color: #1f1f26;
            border-radius: 2px;
            overflow: hidden;
            animation: fadeUp 0.5s ease 0.15s both;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #007acc, #00aaff);
            animation: progress 3.4s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
        }

        .version {
            position: absolute;
            bottom: 14px;
            font-size: 10px;
            color: #27272a;
            letter-spacing: 0.5px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes progress {
            0%   { width: 0%; }
            30%  { width: 40%; }
            70%  { width: 75%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-wrap">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                    <line x1="12" y1="7" x2="12" y2="13"/>
                    <line x1="9" y1="10" x2="15" y2="10"/>
                </svg>
            </div>
            <div class="logo-text">
                <h1>Church Display</h1>
                <p>Software de Proyección</p>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-bar"></div>
        </div>

        <span class="version">v1.0.0</span>
    </div>
</body>
</html>
